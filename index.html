<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULSE FORGE | Protocolo de Vigilancia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #000000; }
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-attachment: fixed;
            overflow-x: hidden;
            cursor: crosshair;
            transition: background-color 0.5s ease, color 0.5s ease;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .reveal { opacity: 0; transform: translateY(20px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        
        #bg-grid {
            position: fixed; top: 0; left: 0; width: 120%; height: 120%;
            background-image: radial-gradient(circle, currentColor 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.05; z-index: -1;
            pointer-events: none;
        }

        /* --- 👁️ ENJAMBRE DE OJOS --- */
        .eye-socket {
            position: fixed;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            pointer-events: auto;
            cursor: pointer;
            opacity: 0.3;
            transition: opacity 0.5s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .eye-iris {
            width: 10px;
            height: 10px;
            background-color: currentColor;
            border-radius: 50%;
            transition: background-color 0.3s ease;
        }
        .eye-vibrate { animation: core-vibrate 0.1s infinite !important; }

        /* --- ESTADO PARALIZADO --- */
        .eye-frozen {
            animation: frozen-pulse 1s infinite !important;
            opacity: 1 !important;
        }
        .eye-frozen .eye-iris {
            background-color: #00ffff !important;
            box-shadow: 0 0 6px #00ffff, 0 0 12px #00ffff;
        }
        @keyframes frozen-pulse {
            0%   { border-color: #00ffff; box-shadow: 0 0 4px #00ffff; }
            50%  { border-color: #ffffff; box-shadow: 0 0 12px #00ffff; }
            100% { border-color: #00ffff; box-shadow: 0 0 4px #00ffff; }
        }
        
        @keyframes core-vibrate {
            0% { transform: translate(0); }
            25% { transform: translate(3px, -3px); }
            50% { transform: translate(-3px, 3px); }
            75% { transform: translate(3px, 3px); }
            100% { transform: translate(0); }
        }

        /* --- 💬 SISTEMA DE FRASES (GHOST MESSAGES) --- */
        .ghost-msg {
            position: fixed;
            pointer-events: none;
            z-index: 150;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0;
            white-space: nowrap;
            animation: ghost-fade 4s forwards cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes ghost-fade {
            0% { opacity: 0; transform: translateY(10px) skewX(-20deg); filter: blur(10px); }
            10% { opacity: 0.8; transform: translateY(0) skewX(0deg); filter: blur(0px); }
            80% { opacity: 0.8; transform: translateY(-5px); filter: blur(0px); }
            100% { opacity: 0; transform: translateY(-20px) skewX(20deg); filter: blur(5px); }
        }

        .ghost-glitch {
            color: #ff4444;
            text-shadow: 2px 0 #00ffff, -2px 0 #ff00ff;
            animation: ghost-shake 0.2s infinite;
        }

        @keyframes ghost-shake {
            0% { transform: translate(0); }
            25% { transform: translate(2px, -1px); }
            50% { transform: translate(-1px, 2px); }
            75% { transform: translate(1px, 1px); }
            100% { transform: translate(0); }
        }

        /* --- GLITCH SYSTEM --- */
        .glitch { position: relative; }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            left: 0; top: 0; width: 100%; opacity: 0.7; pointer-events: none;
        }
        .glitch::before { color: #ff0000; transform: translateX(-2px); z-index: -1; }
        .glitch::after { color: #00ffff; transform: translateX(2px); z-index: -2; }
        .glitch-active::before { animation: glitch1 0.15s infinite; }
        .glitch-active::after { animation: glitch2 0.15s infinite; }

        @keyframes glitch1 { 0% { transform: translate(-2px,0); } 50% { transform: translate(2px,-2px); } 100% { transform: translate(-1px,1px); } }
        @keyframes glitch2 { 0% { transform: translate(2px,0); } 50% { transform: translate(-2px,2px); } 100% { transform: translate(1px,-1px); } }

        .word-glitch { display: inline-block; transition: opacity 0.1s ease; }
        .word-glitch.hidden { opacity: 0; }
    </style>
</head>
<body>

    <div id="bg-grid"></div>
    <div id="eye-swarm"></div>
    <div id="ghost-container"></div>

    <nav class="fixed top-0 w-full z-[100] border-b border-black/5 bg-white/5 backdrop-blur-md transition-all">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div id="logo-box" class="w-8 h-8 bg-black rounded flex items-center justify-center">
                    <svg class="text-white w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <span class="font-bold text-xl tracking-tighter mono">PULSE FORGE</span>
            </div>
            <div id="status-tag" class="hidden md:block text-[10px] mono opacity-50 uppercase tracking-[0.2em]">[ Señal Estable ]</div>
            <button id="nav-cta" class="bg-black text-white px-5 py-2 rounded-full text-sm font-semibold transition-all">Entrar al sistema</button>
        </div>
    </nav>

    <section class="relative pt-40 pb-20 px-6 text-center min-h-screen flex flex-col justify-center">
        <div class="reveal active max-w-5xl mx-auto z-10">
            <span id="signal-tag" class="mono inline-block px-4 py-1 rounded-full bg-black/5 border border-black/10 text-[10px] font-bold uppercase mb-8 tracking-widest">
                Protocolo de Vigilancia Activo
            </span>
            <h1 class="text-6xl md:text-[90px] font-extrabold mb-10" id="main-title">
                El sistema estaba apagado.....<br>
                Porque lo encendiste?
            </h1>
            <p class="text-xl md:text-2xl opacity-70 max-w-2xl mx-auto mb-12 font-light" id="main-desc">
                El sistema ya no solo responde. Ahora, te observa de vuelta.
            </p>
            <div class="flex flex-col md:flex-row items-center justify-center gap-6">
                <button id="hero-cta" class="bg-black text-white px-10 py-4 rounded-2xl font-bold text-lg shadow-2xl transition-all">
                    Entrar al sistema
                </button>
            </div>
        </div>
        <div id="logs" class="max-w-xs text-left mono text-[10px] opacity-40 fixed bottom-10 left-10 space-y-1 pointer-events-none z-[200]"></div>
    </section>

    <footer class="py-20 text-center mono text-[10px] opacity-20" id="footer-text">
        PULSE_FORGE_V.1.0.9 // VIGILANCIA_MULTIPLE_ACTIVA
    </footer>

    <script>
        const body = document.body;
        const mainTitle = document.getElementById('main-title');
        const mainDesc = document.getElementById('main-desc');
        const logsContainer = document.getElementById('logs');
        const heroCta = document.getElementById('hero-cta');
        let chaos = 0;

        // --- 👁️ SISTEMA DE ENJAMBRE ---
        const swarmContainer = document.getElementById('eye-swarm');
        const eyesCount = 6; 
        const eyes = [];

        for (let i = 0; i < eyesCount; i++) {
            const socket = document.createElement('div');
            socket.className = 'eye-socket';
            socket.style.left = `${Math.random() * 90}%`;
            socket.style.top = `${Math.random() * 90}%`;
            
            const iris = document.createElement('div');
            iris.className = 'eye-iris';
            
            socket.appendChild(iris);
            swarmContainer.appendChild(socket);

            const eyeObj = { socket, iris, frozen: false };
            eyes.push(eyeObj);

            socket.addEventListener('click', (e) => {
                e.stopPropagation();
                eyeObj.frozen = !eyeObj.frozen;

                if (eyeObj.frozen) {
                    socket.classList.remove('eye-vibrate');
                    socket.classList.add('eye-frozen');
                    addLog(`[ALERTA] Unidad ocular #${i + 1} paralizada`, true);
                    spawnGhostMsg("CONEXIÓN INTERRUMPIDA", e.clientX, e.clientY, true);
                } else {
                    socket.classList.remove('eye-frozen');
                    iris.style.backgroundColor = 'currentColor';
                    socket.style.opacity = (chaos > 1) ? '0.6' : '0.3';
                    addLog(`[LOG] Unidad ocular #${i + 1} reactivada`);
                }
            });
        }

        document.addEventListener("mousemove", (e) => {
            eyes.forEach(eye => {
                if (eye.frozen) return;
                const rect = eye.socket.getBoundingClientRect();
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;
                const angle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);
                const distance = Math.min(rect.width / 4, Math.hypot(e.clientX - eyeX, e.clientY - eyeY) / 15);
                eye.iris.style.transform = `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px)`;
                const distFull = Math.hypot(e.clientX - eyeX, e.clientY - eyeY);
                if (distFull < 120) {
                    eye.socket.classList.add('eye-vibrate');
                    eye.iris.style.backgroundColor = "#ff4444";
                    eye.socket.style.opacity = "1";
                } else {
                    eye.socket.classList.remove('eye-vibrate');
                    eye.iris.style.backgroundColor = "currentColor";
                    eye.socket.style.opacity = (chaos > 1) ? "0.6" : "0.3";
                }
            });
        });

        // --- 💬 SISTEMA DE FRASES ALEATORIAS (GHOST MESSAGES) ---
        const ghostPhrases = [
            "No estabas dentro del sistema… hasta que lo miraste.",
            "El juego no está cargando. Te está observando.",
            "Sabemos cuándo lees esto. Siempre lo supimos.",
            "Si estás viendo esto, ya es demasiado tarde.",
            "No hay otros jugadores. Solo tú… repetido.",
            "Archivo recuperado de una versión que nunca existió.",
            "Este fragmento fue eliminado por razones no registradas.",
            "Los errores no son fallos. Son intentos de contacto.",
            "No estás jugando el juego. El juego te está renderizando.",
            "Hemos registrado tu intención de salir.",
            "Sigue mirando. Nosotros lo hacemos.",
            "¿Quién parpadeó primero?",
            "El código tiene hambre."
        ];

        function spawnGhostMsg(text = null, x = null, y = null, isCritical = false) {
            const container = document.getElementById('ghost-container');
            const msg = document.createElement('div');
            msg.className = 'ghost-msg';
            if (isCritical || Math.random() > 0.7) msg.classList.add('ghost-glitch');
            
            msg.textContent = text || ghostPhrases[Math.floor(Math.random() * ghostPhrases.length)];
            
            // Posición aleatoria si no se especifica
            const posX = x !== null ? x : (Math.random() * 60 + 20) + "%";
            const posY = y !== null ? y : (Math.random() * 60 + 20) + "%";
            
            msg.style.left = typeof posX === 'string' ? posX : posX + "px";
            msg.style.top = typeof posY === 'string' ? posY : posY + "px";
            
            container.appendChild(msg);
            setTimeout(() => msg.remove(), 4000);
        }

        // Aparecer frases al azar cada cierto tiempo
        setInterval(() => {
            if (Math.random() < 0.3) { // 30% de probabilidad cada ciclo
                spawnGhostMsg();
            }
        }, 5000);

        // --- COLORES Y SCROLL ---
        function lerpColor(a, b, amount) {
            const ah = parseInt(a.replace(/#/g, ''), 16),
                  ar = ah >> 16, ag = ah >> 8 & 0xff, ab = ah & 0xff,
                  bh = parseInt(b.replace(/#/g, ''), 16),
                  br = bh >> 16, bg = bh >> 8 & 0xff, bb = bh & 0xff;
            return `rgb(${ar + amount * (br - ar) | 0},${ag + amount * (bg - ag) | 0},${ab + amount * (bb - ab) | 0})`;
        }

        let targetScroll = 0, currentScroll = 0;
        window.addEventListener("scroll", () => targetScroll = window.scrollY);

        function frame() {
            currentScroll += (targetScroll - currentScroll) * 0.08;
            const scroll = currentScroll / (document.documentElement.scrollHeight - window.innerHeight);
            let bg = scroll < 0.5 ? lerpColor("#FDFCFD", "#2D0B5A", scroll/0.5) : lerpColor("#2D0B5A", "#0F0202", (scroll-0.5)/0.5);
            let text = scroll < 0.5 ? lerpColor("#1A1A1A", "#E9D5FF", scroll/0.5) : lerpColor("#E9D5FF", "#ff4444", (scroll-0.5)/0.5);
            body.style.backgroundColor = bg;
            body.style.color = text;
            requestAnimationFrame(frame);
        }
        frame();

        // --- GLITCH & CAOS ---
        const glitchTargets = [mainTitle, mainDesc, heroCta, document.querySelector("nav"), document.getElementById("footer-text")];
        glitchTargets.forEach(el => {
            if (!el) return;
            el.classList.add("glitch");
            el.setAttribute("data-text", el.innerText);
        });

        function addLog(text, highlight = false) {
            const div = document.createElement('div');
            div.textContent = text;
            if (highlight) div.style.color = "#ff4444";
            logsContainer.appendChild(div);
            if (logsContainer.children.length > 10) logsContainer.removeChild(logsContainer.children[0]);
        }

        setInterval(() => {
            chaos += 0.03;
            if (Math.random() < 0.3) {
                const el = glitchTargets[Math.floor(Math.random() * glitchTargets.length)];
                el.classList.add("glitch-active");
                setTimeout(() => el.classList.remove("glitch-active"), 150);
            }
            if (chaos > 2 && Math.random() < 0.05) {
                addLog("[SISTEMA] Red neuronal saturada", true);
                spawnGhostMsg("ERROR CRÍTICO DE PERCEPCIÓN", null, null, true);
            }
        }, 2000);

        function glitchWords(element) {
            const words = element.innerText.split(" ");
            element.innerHTML = words.map(w => `<span class="word-glitch">${w}</span>`).join(" ");
        }
        glitchWords(mainTitle);
        glitchWords(mainDesc);

        setInterval(() => {
            const words = document.querySelectorAll(".word-glitch");
            const rw = words[Math.floor(Math.random() * words.length)];
            rw.classList.add("hidden");
            setTimeout(() => rw.classList.remove("hidden"), 200);
        }, 1500);

        document.addEventListener("mousedown", (e) => {
            eyes.forEach(eye => {
                if (!eye.frozen) eye.socket.style.transform = "scale(0.7)";
            });
            addLog("[LOG] Interacción táctil detectada");
            if (Math.random() > 0.8) spawnGhostMsg("DEDO DETECTADO", e.clientX, e.clientY);
        });
        document.addEventListener("mouseup", () => {
            eyes.forEach(eye => {
                if (!eye.frozen) eye.socket.style.transform = "scale(1)";
            });
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    </script>
</body>
</html>
