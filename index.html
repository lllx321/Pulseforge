<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULSE FORGE | Protocolo de Vigilancia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-cute: #f7f4ff;
            --accent-cute: #c9b6ff;
            --text-cute: #1a1a1a;
            
            --bg-unstable: #2a1f3d;
            --accent-unstable: #ff4fd8;
            --text-unstable: #ece6ff;
            
            --bg-corrupt: #0b0000;
            --accent-corrupt: #ff0033;
            --text-corrupt: #ff0033;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: var(--bg-cute);
            color: var(--text-cute);
            background-attachment: fixed;
            overflow-x: hidden;
            cursor: crosshair;
            transition: background-color 0.8s steps(4), color 0.5s ease, filter 1s ease;
        }

        /* --- 💀 EFECTO RUIDO (Grain) --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: overlay;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        #bg-grid {
            position: fixed; top: 0; left: 0; width: 120%; height: 120%;
            background-image: radial-gradient(circle, currentColor 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.05; z-index: -1;
            pointer-events: none;
        }

        /* --- 💀 CORRUPCIÓN VISUAL --- */
        .body-glitch {
            animation: body-glitch-anim 0.2s infinite;
        }

        @keyframes body-glitch-anim {
            0% { transform: translate(0); filter: hue-rotate(0deg); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(3px, -3px); }
            60% { filter: contrast(250%) brightness(1.2); }
            80% { transform: translate(-2px, 2px); filter: invert(0.1); }
            100% { transform: translate(0); }
        }

        /* --- 👁️ ENJAMBRE DE OJOS --- */
        .eye-socket {
            position: fixed;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 1px solid currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            pointer-events: auto;
            cursor: pointer;
            opacity: 0.3;
            transition: opacity 0.5s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .eye-iris {
            width: 10px;
            height: 10px;
            background-color: currentColor;
            border-radius: 50%;
            transition: background-color 0.3s ease;
        }
        .eye-vibrate { animation: core-vibrate 0.1s infinite !important; }

        .eye-frozen {
            animation: frozen-pulse 1s infinite !important;
            opacity: 1 !important;
        }
        .eye-frozen .eye-iris {
            background-color: #00ffff !important;
            box-shadow: 0 0 6px #00ffff, 0 0 12px #00ffff;
        }
        @keyframes frozen-pulse {
            0%   { border-color: #00ffff; box-shadow: 0 0 4px #00ffff; }
            50%  { border-color: #ffffff; box-shadow: 0 0 12px #00ffff; }
            100% { border-color: #00ffff; box-shadow: 0 0 4px #00ffff; }
        }
        
        @keyframes core-vibrate {
            0% { transform: translate(0); }
            25% { transform: translate(3px, -3px); }
            50% { transform: translate(-3px, 3px); }
            75% { transform: translate(3px, 3px); }
            100% { transform: translate(0); }
        }

        /* --- 💬 GHOST MESSAGES --- */
        .ghost-msg {
            position: fixed;
            pointer-events: none;
            z-index: 150;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0;
            white-space: nowrap;
            animation: ghost-fade 4s forwards cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes ghost-fade {
            0% { opacity: 0; transform: translateY(10px) skewX(-20deg); filter: blur(10px); }
            10% { opacity: 0.8; transform: translateY(0) skewX(0deg); filter: blur(0px); }
            80% { opacity: 0.8; transform: translateY(-5px); filter: blur(0px); }
            100% { opacity: 0; transform: translateY(-20px) skewX(20deg); filter: blur(5px); }
        }

        .ghost-glitch {
            color: var(--accent-unstable);
            text-shadow: 2px 0 #00ffff, -2px 0 #ff00ff;
            animation: ghost-shake 0.2s infinite;
        }

        @keyframes ghost-shake {
            0% { transform: translate(0); }
            25% { transform: translate(2px, -1px); }
            50% { transform: translate(-1px, 2px); }
            75% { transform: translate(1px, 1px); }
            100% { transform: translate(0); }
        }

        /* --- CURSOR INFECTADO --- */
        .cursor-scrap {
            position: fixed;
            pointer-events: none;
            z-index: 200;
            color: var(--accent-corrupt);
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            opacity: 0.7;
            animation: scrap-fade 0.3s forwards;
        }
        @keyframes scrap-fade {
            to { opacity: 0; transform: translateY(-10px) scale(0.5); }
        }

        /* --- ELEMENTOS DUPLICADOS --- */
        .fake-clone {
            pointer-events: none;
            z-index: 5;
            filter: blur(1px);
            mix-blend-mode: difference;
        }

        /* --- GLITCH SYSTEM --- */
        .glitch { position: relative; }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            left: 0; top: 0; width: 100%; opacity: 0.7; pointer-events: none;
        }
        .glitch::before { color: #ff0000; transform: translateX(-2px); z-index: -1; }
        .glitch::after { color: #00ffff; transform: translateX(2px); z-index: -2; }
        .glitch-active::before { animation: glitch1 0.15s infinite; }
        .glitch-active::after { animation: glitch2 0.15s infinite; }

        @keyframes glitch1 { 0% { transform: translate(-2px,0); } 50% { transform: translate(2px,-2px); } 100% { transform: translate(-1px,1px); } }
        @keyframes glitch2 { 0% { transform: translate(2px,0); } 50% { transform: translate(-2px,2px); } 100% { transform: translate(1px,-1px); } }

        .word-glitch { display: inline-block; transition: opacity 0.1s ease; }
        .word-glitch.hidden { opacity: 0; }

        .reveal { opacity: 0; transform: translateY(20px); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* --- EVENTOS DE SISTEMA (INFERIOR IZQUIERDA) --- */
        #system-status-msg {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: var(--accent-corrupt);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: bold;
            z-index: 9999;
            pointer-events: none;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* --- REACCIONES (INFERIOR DERECHA) --- */
        #reaction-msg {
            position: fixed;
            bottom: 30px;
            right: 30px;
            color: var(--accent-corrupt);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: bold;
            z-index: 9999;
            pointer-events: none;
            text-transform: uppercase;
            transition: opacity 0.3s ease;
            opacity: 0;
        }
    </style>
</head>
<body>

    <div id="bg-grid"></div>
    <div id="eye-swarm"></div>
    <div id="ghost-container"></div>
    <div id="system-status-msg"></div>
    <div id="reaction-msg"></div>

    <nav class="fixed top-0 w-full z-[100] border-b border-black/5 bg-white/5 backdrop-blur-md transition-all">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div id="logo-box" class="w-8 h-8 bg-black rounded flex items-center justify-center">
                    <svg class="text-white w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <span class="font-bold text-xl tracking-tighter mono">PULSE FORGE</span>
            </div>
            <div id="status-tag" class="hidden md:block text-[10px] mono opacity-50 uppercase tracking-[0.2em]">[ Señal Estable ]</div>
            <button id="nav-cta" class="bg-black text-white px-5 py-2 rounded-full text-sm font-semibold transition-all">Entrar al sistema</button>
        </div>
    </nav>

    <section class="relative pt-40 pb-20 px-6 text-center min-h-screen flex flex-col justify-center">
        <div class="reveal active max-w-5xl mx-auto z-10">
            <span id="signal-tag" class="mono inline-block px-4 py-1 rounded-full bg-black/5 border border-black/10 text-[10px] font-bold uppercase mb-8 tracking-widest">
                Protocolo de Vigilancia Activo
            </span>
            <h1 class="text-6xl md:text-[90px] font-extrabold mb-10" id="main-title">
                No estás solo.<br>
                Nosotros tampoco.
            </h1>
            <p class="text-xl md:text-2xl opacity-70 max-w-2xl mx-auto mb-12 font-light" id="main-desc">
                El sistema ya no solo responde. Ahora, te observa de vuelta.
            </p>
            <div class="flex flex-col md:flex-row items-center justify-center gap-6">
                <button id="hero-cta" class="bg-black text-white px-10 py-4 rounded-2xl font-bold text-lg shadow-2xl transition-all">
                    Entrar al sistema
                </button>
                <a href="memorias.html" class="bg-black text-white px-10 py-4 rounded-2xl font-bold text-lg shadow-2xl transition-all hover:shadow-lg hover:scale-105 inline-block">
                    Acceder a Memorias
                </a>
            </div>
        </div>
        <div id="logs" class="max-w-xs text-left mono text-[10px] opacity-40 fixed bottom-10 left-10 space-y-1 pointer-events-none z-[200]"></div>
    </section>

    <footer class="py-20 text-center mono text-[10px] opacity-20" id="footer-text">
        PULSE_FORGE_V.1.0.9 // VIGILANCIA_MULTIPLE_ACTIVA
    </footer>

    <script>
        const body = document.body;
        const mainTitle = document.getElementById('main-title');
        const mainDesc = document.getElementById('main-desc');
        const logsContainer = document.getElementById('logs');
        const heroCta = document.getElementById('hero-cta');
        let chaos = 0;
        let scrollPercent = 0;

        // --- 🧬 SISTEMA DE CORRUPCIÓN ACUMULATIVA ---
        let corruption = Number(localStorage.getItem("pf_corruption") || 0);

        function addCorruption(amount) {
            corruption += amount;
            localStorage.setItem("pf_corruption", corruption);
            applyCorruption();
        }

        function applyCorruption() {
            if (corruption > 3) body.style.filter = "contrast(120%)";
            if (corruption > 6) body.style.filter = "contrast(150%) hue-rotate(20deg)";
            if (corruption > 10) {
                body.style.backgroundColor = "var(--bg-corrupt)";
                body.style.filter = "contrast(200%) saturate(200%)";
            }
        }

        // --- 🧠 MOTOR DE ESTADOS ---
        function getPulseState() {
            const hour = new Date().getHours();
            if (scrollPercent > 80 || (hour >= 3 && hour <= 5) || corruption > 10) return "critical";
            if (scrollPercent > 40 || (hour >= 0 && hour < 7) || corruption > 5) return "unstable";
            if (hour >= 7 && hour < 18) return "stable";
            return "corrupted";
        }

        function updateVisualPalette() {
            const state = getPulseState();
            const isGlitching = Math.random() > 0.95;
            let visualState = isGlitching ? "unstable" : state;

            if (visualState === "stable") {
                body.style.backgroundColor = "var(--bg-cute)";
                body.style.color = "var(--text-cute)";
                heroCta.style.backgroundColor = "var(--text-cute)";
            } else if (visualState === "unstable" || visualState === "corrupted") {
                body.style.backgroundColor = "var(--bg-unstable)";
                body.style.color = "var(--text-unstable)";
                heroCta.style.backgroundColor = "var(--accent-unstable)";
            } else {
                body.style.backgroundColor = "var(--bg-corrupt)";
                body.style.color = "var(--accent-corrupt)";
                heroCta.style.backgroundColor = "var(--accent-corrupt)";
            }
        }

        // --- 👁️ REACCIONES AL COMPORTAMIENTO ---
        function triggerReaction(type) {
            const messages = {
                fast_scroll: "SLOW DOWN",
                idle: "WHY ARE YOU WAITING?",
                click: "NOTED"
            };

            if (type === "click") addCorruption(0.2);
            if (type === "fast_scroll") addCorruption(0.5);
            if (type === "idle") addCorruption(0.1);

            const msg = messages[type];
            const reactionEl = document.getElementById('reaction-msg');
            if (reactionEl) {
                reactionEl.innerText = msg;
                reactionEl.style.opacity = "1";
                setTimeout(() => reactionEl.style.opacity = "0", 2000);
            }
        }

        let lastScrollTime = 0;
        window.addEventListener("scroll", () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            scrollPercent = (winScroll / height) * 100;
            updateVisualPalette();

            const now = Date.now();
            if (now - lastScrollTime < 50 && now - lastScrollTime > 0) {
                triggerReaction("fast_scroll");
            }
            lastScrollTime = now;
        });

        let idleTimer;
        document.addEventListener("mousemove", (e) => {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => triggerReaction("idle"), 8000);

            // Cursor infectado
            const scrap = document.createElement("div");
            const symbols = ["█", "▒", "░", "#", "?", "0", "1"];
            scrap.className = "cursor-scrap";
            scrap.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            scrap.style.left = e.clientX + "px";
            scrap.style.top = e.clientY + "px";
            document.body.appendChild(scrap);
            setTimeout(() => scrap.remove(), 300);

            eyes.forEach(eye => {
                if (eye.frozen) return;
                const rect = eye.socket.getBoundingClientRect();
                const eyeX = rect.left + rect.width / 2;
                const eyeY = rect.top + rect.height / 2;
                const angle = Math.atan2(e.clientY - eyeY, e.clientX - eyeX);
                const distance = Math.min(rect.width / 4, Math.hypot(e.clientX - eyeX, e.clientY - eyeY) / 15);
                eye.iris.style.transform = `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px)`;
            });
        });

        document.addEventListener("click", () => triggerReaction("click"));

        // --- 🕳️ INESTABILIDAD ESTRUCTURAL ---
        setInterval(() => {
            const elements = document.querySelectorAll("h1, p, button, span");
            const target = elements[Math.floor(Math.random() * elements.length)];
            if (!target) return;

            const originalOpacity = target.style.opacity;
            target.style.opacity = "0";
            setTimeout(() => target.style.opacity = originalOpacity || "1", 800);
        }, 7000);

        setInterval(() => {
            const el = document.querySelector("p");
            if (el && Math.random() > 0.8) {
                const originalText = el.innerText;
                el.innerText = "/// MISSING DATA ///";
                setTimeout(() => el.innerText = originalText, 2000);
            }
        }, 12000);

        // --- 👁️ SISTEMA DE ENJAMBRE ---
        const swarmContainer = document.getElementById('eye-swarm');
        const eyesCount = 6; 
        const eyes = [];
        for (let i = 0; i < eyesCount; i++) {
            const socket = document.createElement('div');
            socket.className = 'eye-socket';
            socket.style.left = `${Math.random() * 90}%`;
            socket.style.top = `${Math.random() * 90}%`;
            const iris = document.createElement('div');
            iris.className = 'eye-iris';
            socket.appendChild(iris);
            swarmContainer.appendChild(socket);
            const eyeObj = { socket, iris, frozen: false };
            eyes.push(eyeObj);

            socket.addEventListener('click', (e) => {
                e.stopPropagation();
                eyeObj.frozen = !eyeObj.frozen;
                if (eyeObj.frozen) {
                    socket.classList.add('eye-frozen');
                    addLog(`[ALERTA] Unidad ocular #${i + 1} paralizada`, true);
                } else {
                    socket.classList.remove('eye-frozen');
                    addLog(`[LOG] Unidad ocular #${i + 1} reactivada`);
                }
            });
        }

        // --- 💀 EVENTOS DE SISTEMA ---
        function systemEvent() {
            const state = getPulseState();
            const messages = {
                stable: ["SYSTEM ONLINE", "MONITORING ACTIVE"],
                unstable: ["USER PATTERN IRREGULAR", "RE-CALIBRATING..."],
                corrupted: ["DATA LEAK IN PROGRESS", "CORRUPTION SPREADING"],
                critical: ["/// ENTITY AWAKE ///", "DEEP DESCENT DETECTED"]
            };
            const pool = messages[state];
            const msg = pool[Math.floor(Math.random() * pool.length)];
            const statusEl = document.getElementById('system-status-msg');
            if (statusEl) {
                statusEl.innerText = `[ ${msg} ]`;
                statusEl.style.opacity = "1";
                if (state === "critical" || state === "corrupted") {
                    body.classList.add("body-glitch");
                    setTimeout(() => body.classList.remove("body-glitch"), 400);
                }
                setTimeout(() => statusEl.style.opacity = "0.3", 2000);
            }
        }

        setInterval(() => {
            if (Math.random() > 0.7) systemEvent();
        }, 5000);

        window.addEventListener("load", () => {
            if (!localStorage.getItem("pulseforge_seen")) {
                body.classList.add("body-glitch");
                const overlay = document.createElement("div");
                overlay.innerText = "WE WERE WAITING FOR YOU...";
                overlay.style.cssText = "position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--accent-corrupt); font-size:2.5rem; font-weight:900; z-index:9999; font-family:monospace; background:black; padding:20px 40px; border:4px solid var(--accent-corrupt);";
                document.body.appendChild(overlay);
                setTimeout(() => { overlay.remove(); body.classList.remove("body-glitch"); }, 2500);
                localStorage.setItem("pulseforge_seen", "true");
            }
            applyCorruption();
            updateVisualPalette();
        });

        // --- GLITCH & CAOS ---
        const glitchTargets = [mainTitle, mainDesc, heroCta, document.querySelector("nav"), document.getElementById("footer-text")];
        glitchTargets.forEach(el => {
            if (!el) return;
            el.classList.add("glitch");
            el.setAttribute("data-text", el.innerText);
        });

        function addLog(text, highlight = false) {
            const div = document.createElement('div');
            div.textContent = text;
            if (highlight) div.style.color = "var(--accent-corrupt)";
            logsContainer.appendChild(div);
            if (logsContainer.children.length > 10) logsContainer.removeChild(logsContainer.children[0]);
        }

        setInterval(() => {
            if (Math.random() < 0.3) {
                const el = glitchTargets[Math.floor(Math.random() * glitchTargets.length)];
                el.classList.add("glitch-active");
                setTimeout(() => el.classList.remove("glitch-active"), 150);
            }
        }, 2000);

        function glitchWords(element) {
            const words = element.innerText.split(" ");
            element.innerHTML = words.map(w => `<span class="word-glitch">${w}</span>`).join(" ");
        }
        glitchWords(mainTitle);
        glitchWords(mainDesc);

        setInterval(() => {
            const words = document.querySelectorAll(".word-glitch");
            if (words.length === 0) return;
            const rw = words[Math.floor(Math.random() * words.length)];
            rw.classList.add("hidden");
            setTimeout(() => rw.classList.remove("hidden"), 200);
        }, 1500);

        document.addEventListener("mousedown", (e) => {
            eyes.forEach(eye => { if (!eye.frozen) eye.socket.style.transform = "scale(0.7)"; });
        });
        document.addEventListener("mouseup", () => {
            eyes.forEach(eye => { if (!eye.frozen) eye.socket.style.transform = "scale(1)"; });
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // --- SISTEMA DE DESBLOQUEO DE CODIGOS ---
        const CODES_SYSTEM = {
            "NULL-LOG-01": { triggered: false },
            "VOID-TRACE-02": { triggered: false },
            "ECHO-SIGNAL-03": { triggered: false },
            "NULL-LOG-03": { triggered: false },
            "INTRUDER-INDEX": { triggered: false },
            "CORRUPT-TRACE-04": { triggered: false },
            "MEMORY-GATE": { triggered: false },
            "THYRIAN-ECHO": { triggered: false },
            "SEAL-FAILURE": { triggered: false }
        };

        function unlockCode(codeKey) {
            if (CODES_SYSTEM[codeKey] && !CODES_SYSTEM[codeKey].triggered) {
                CODES_SYSTEM[codeKey].triggered = true;
                let unlockedCodes = JSON.parse(localStorage.getItem("pf_unlockedCodes") || "{}");
                unlockedCodes[codeKey] = true;
                localStorage.setItem("pf_unlockedCodes", JSON.stringify(unlockedCodes));
                addLog(`[CODIGO DESBLOQUEADO] ${codeKey}`, true);
            }
        }

        let fastScrollCount = 0;
        let lastFastScrollTime = 0;
        window.addEventListener("scroll", () => {
            const now = Date.now();
            if (now - lastFastScrollTime < 100 && now - lastFastScrollTime > 0) {
                fastScrollCount++;
                if (fastScrollCount >= 5) {
                    unlockCode("NULL-LOG-01");
                    fastScrollCount = 0;
                }
            }
            lastFastScrollTime = now;
        });

        let eyeClickCount = 0;
        eyes.forEach(eye => {
            eye.socket.addEventListener('click', () => {
                eyeClickCount++;
                if (eyeClickCount >= 3) {
                    unlockCode("VOID-TRACE-02");
                    eyeClickCount = 0;
                }
            });
        });

        let idleTimer3 = null;
        document.addEventListener("mousemove", () => {
            clearTimeout(idleTimer3);
            idleTimer3 = setTimeout(() => {
                unlockCode("ECHO-SIGNAL-03");
            }, 5000);
        });
        document.addEventListener("click", () => {
            clearTimeout(idleTimer3);
        });

        let scrolledToEnd = false;
        let endWaitTimer = null;
        window.addEventListener("scroll", () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            if (winScroll >= height - 10) {
                if (!scrolledToEnd) {
                    scrolledToEnd = true;
                    clearTimeout(endWaitTimer);
                    endWaitTimer = setTimeout(() => {
                        unlockCode("NULL-LOG-03");
                    }, 3000);
                }
            } else {
                scrolledToEnd = false;
                clearTimeout(endWaitTimer);
            }
        });

        let titleHoverTimer = null;
        mainTitle.addEventListener("mouseenter", () => {
            titleHoverTimer = setTimeout(() => {
                unlockCode("INTRUDER-INDEX");
            }, 2000);
        });
        mainTitle.addEventListener("mouseleave", () => {
            clearTimeout(titleHoverTimer);
        });

        function createFloatingCode() {
            if (CODES_SYSTEM["CORRUPT-TRACE-04"].triggered) return;
            const floatingCode = document.createElement("div");
            floatingCode.className = "ghost-msg ghost-glitch";
            floatingCode.innerText = "CORRUPT-TRACE-04";
            floatingCode.style.left = Math.random() * 80 + 10 + "%";
            floatingCode.style.top = Math.random() * 80 + 10 + "%";
            floatingCode.style.cursor = "pointer";
            floatingCode.addEventListener("click", (e) => {
                e.stopPropagation();
                unlockCode("CORRUPT-TRACE-04");
                floatingCode.remove();
            });
            document.body.appendChild(floatingCode);
            setTimeout(() => floatingCode.remove(), 4000);
        }
        setInterval(() => {
            if (Math.random() > 0.7 && !CODES_SYSTEM["CORRUPT-TRACE-04"].triggered) {
                createFloatingCode();
            }
        }, 8000);

        let memoriasBtnHoverCount = 0;
        const memoriasBtnLink = document.querySelector('a[href="memorias.html"]');
        if (memoriasBtnLink) {
            const style = document.createElement('style');
            style.textContent = `
                .memorias-btn-glitch {
                    animation: memorias-glitch 0.3s infinite;
                    text-shadow: 
                        2px 0 #ff0033,
                        -2px 0 #00ffff,
                        0 0 10px rgba(255, 0, 51, 0.5);
                }
                @keyframes memorias-glitch {
                    0% { transform: translate(0); }
                    20% { transform: translate(-2px, 2px); }
                    40% { transform: translate(2px, -2px); }
                    60% { transform: translate(-1px, 1px); }
                    80% { transform: translate(1px, -1px); }
                    100% { transform: translate(0); }
                }
            `;
            document.head.appendChild(style);
            
            memoriasBtnLink.addEventListener("mouseenter", () => {
                memoriasBtnHoverCount++;
                memoriasBtnLink.classList.add('memorias-btn-glitch');
                if (memoriasBtnHoverCount >= 3) {
                    unlockCode("MEMORY-GATE");
                    memoriasBtnHoverCount = 0;
                }
            });
            
            memoriasBtnLink.addEventListener("mouseleave", () => {
                memoriasBtnLink.classList.remove('memorias-btn-glitch');
            });
        }

        const firstLetterSpan = document.querySelector(".word-glitch");
        if (firstLetterSpan) {
            firstLetterSpan.style.cursor = "pointer";
            firstLetterSpan.addEventListener("click", (e) => {
                e.stopPropagation();
                unlockCode("THYRIAN-ECHO");
            });
        }

        setInterval(() => {
            if (corruption > 15) {
                unlockCode("SEAL-FAILURE");
            }
        }, 1000);

    </script>
</body>
</html>
